# Docker-specific overrides — all secrets come from .env via environment variables.
# This file only contains values that differ from config.yaml in a Docker network context.
app:
  name: "SentiStream Worker"
  env: "development"
  log_level: "INFO"

llm:
  model: "gpt-4o-mini"
  api_key: "placeholder"  # overridden by SENTISTREAM_LLM_API_KEY env var

kafka:
  bootstrap_servers:
    - "kafka:29092"
  topics:
    reviews_raw: "reviews_raw"
    reviews_embedded: "reviews_embedded"
    reviews_clustered: "reviews_clustered"

database:
  postgres_dsn: "postgresql+asyncpg://sentistream:password@postgres:5432/sentistream"
  redis_url: "redis://redis:6379/0"

ml:
  hf_repo_id: "ZenbiteXYZ/sentistream-encoder-v4"
  embedder_onnx_dir: "/app/models/bge-small"
  umap_onnx_path: "/app/models/umap/model.onnx"
