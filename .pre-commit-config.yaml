repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.6
  hooks:
    # Run the linter.
    - id: ruff-check
      types_or: [ python, pyi ]
      args: [ --fix, --exit-non-zero-on-fix]
    # Run the formatter.
    - id: ruff-format
      types_or: [ python, pyi ]
